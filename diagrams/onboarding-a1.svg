<svg viewBox="0 0 820 1180" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Fluxo de onboarding do certificado digital A1</title>
  <desc id="desc">Oito etapas: cadastro do cliente, procuração eletrônica no eCAC, upload seguro do PFX, validação automática, teste real no SERPRO, criptografia com KMS, uso em runtime, expiração e revogação.</desc>

  <style>
    .step-box { fill: #f6f6f4; stroke: #e3e3de; stroke-width: 1; }
    .step-num { fill: #c15f3c; }
    .step-num-text { fill: #fff; font-family: system-ui, sans-serif; font-size: 13px; font-weight: 700; }
    .step-title { fill: #1a1a1a; font-family: system-ui, sans-serif; font-size: 13px; font-weight: 600; }
    .step-desc { fill: #666; font-family: system-ui, sans-serif; font-size: 11px; }
    .actor { fill: #999; font-family: system-ui, sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.5px; }
    .sec-box { fill: #fff; stroke: #c15f3c; stroke-width: 1; stroke-dasharray: 3 3; }
    .sec-label { fill: #c15f3c; font-family: system-ui, sans-serif; font-size: 10px; font-weight: 600; }
    .sec-text { fill: #666; font-family: system-ui, sans-serif; font-size: 10px; }
    .arrow { stroke: #999; stroke-width: 1.5; fill: none; }
    .title-text { fill: #1a1a1a; font-family: system-ui, sans-serif; font-size: 18px; font-weight: 700; }
    .subtitle-text { fill: #666; font-family: system-ui, sans-serif; font-size: 12px; }
    .fail-arrow { stroke: #b5482a; stroke-width: 1.2; fill: none; stroke-dasharray: 4 3; }
    .fail-label { fill: #b5482a; font-family: system-ui, sans-serif; font-size: 10px; font-style: italic; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#999" />
    </marker>
    <marker id="arrowhead-fail" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#b5482a" />
    </marker>
  </defs>

  <text x="410" y="34" text-anchor="middle" class="title-text">Onboarding do Certificado Digital A1</text>
  <text x="410" y="56" text-anchor="middle" class="subtitle-text">Cliente -> Sua API -> Receita Federal / SERPRO</text>

  <text x="110" y="90" class="actor">CLIENTE</text>
  <text x="410" y="90" text-anchor="middle" class="actor">SUA API</text>
  <text x="720" y="90" text-anchor="middle" class="actor">RECEITA / SERPRO</text>

  <g>
    <rect x="40" y="110" width="220" height="70" rx="8" class="step-box"/>
    <circle cx="60" cy="130" r="12" class="step-num"/>
    <text x="60" y="135" text-anchor="middle" class="step-num-text">1</text>
    <text x="80" y="135" class="step-title">Cadastro do cliente</text>
    <text x="50" y="158" class="step-desc">CNPJ + aceite LGPD e termos</text>
    <text x="50" y="172" class="step-desc">de procuracao eletronica</text>
  </g>

  <g>
    <rect x="560" y="110" width="220" height="70" rx="8" class="step-box"/>
    <circle cx="580" cy="130" r="12" class="step-num"/>
    <text x="580" y="135" text-anchor="middle" class="step-num-text">2</text>
    <text x="600" y="135" class="step-title">Procuracao no eCAC</text>
    <text x="570" y="158" class="step-desc">Cliente autoriza seu CNPJ</text>
    <text x="570" y="172" class="step-desc">como procurador (servicos especificos)</text>
  </g>
  <path d="M 260 145 L 560 145" class="arrow" marker-end="url(#arrowhead)"/>

  <g>
    <rect x="40" y="220" width="220" height="80" rx="8" class="step-box"/>
    <circle cx="60" cy="240" r="12" class="step-num"/>
    <text x="60" y="245" text-anchor="middle" class="step-num-text">3</text>
    <text x="80" y="245" class="step-title">Upload do PFX</text>
    <text x="50" y="268" class="step-desc">Arquivo .pfx + senha via</text>
    <text x="50" y="282" class="step-desc">TLS 1.3. Nunca grava em disco.</text>
  </g>
  <path d="M 150 180 L 150 220" class="arrow" marker-end="url(#arrowhead)"/>

  <g>
    <rect x="290" y="230" width="200" height="60" rx="6" class="sec-box"/>
    <text x="300" y="248" class="sec-label">CONTROLE</text>
    <text x="300" y="264" class="sec-text">Leitura so em memoria.</text>
    <text x="300" y="278" class="sec-text">Senha guardada separada do PFX.</text>
  </g>

  <g>
    <rect x="40" y="340" width="220" height="100" rx="8" class="step-box"/>
    <circle cx="60" cy="360" r="12" class="step-num"/>
    <text x="60" y="365" text-anchor="middle" class="step-num-text">4</text>
    <text x="80" y="365" class="step-title">Validacao automatica</text>
    <text x="50" y="388" class="step-desc">- Senha abre o PFX</text>
    <text x="50" y="402" class="step-desc">- CNPJ do cert = CNPJ cadastrado</text>
    <text x="50" y="416" class="step-desc">- Nao expirado / Nao revogado (CRL)</text>
    <text x="50" y="430" class="step-desc">- Emissor ICP-Brasil credenciado</text>
  </g>
  <path d="M 150 300 L 150 340" class="arrow" marker-end="url(#arrowhead)"/>

  <path d="M 40 390 Q 10 390 10 300 Q 10 140 150 140 L 150 145" class="fail-arrow" marker-end="url(#arrowhead-fail)"/>
  <text x="18" y="250" class="fail-label" transform="rotate(-90 18 250)">falha -> aborta e notifica</text>

  <g>
    <rect x="560" y="340" width="220" height="80" rx="8" class="step-box"/>
    <circle cx="580" cy="360" r="12" class="step-num"/>
    <text x="580" y="365" text-anchor="middle" class="step-num-text">5</text>
    <text x="600" y="365" class="step-title">Teste real no SERPRO</text>
    <text x="570" y="388" class="step-desc">Consulta CNPJ proprio para</text>
    <text x="570" y="402" class="step-desc">confirmar procuracao ativa.</text>
  </g>
  <path d="M 260 385 L 560 380" class="arrow" marker-end="url(#arrowhead)"/>

  <g>
    <rect x="40" y="470" width="220" height="90" rx="8" class="step-box"/>
    <circle cx="60" cy="490" r="12" class="step-num"/>
    <text x="60" y="495" text-anchor="middle" class="step-num-text">6</text>
    <text x="80" y="495" class="step-title">Criptografia + Guarda</text>
    <text x="50" y="518" class="step-desc">AES-256-GCM + envelope key</text>
    <text x="50" y="532" class="step-desc">do KMS isolada por tenant.</text>
    <text x="50" y="546" class="step-desc">Certificado e senha separados.</text>
  </g>
  <path d="M 670 420 Q 670 450 150 450 L 150 470" class="arrow" marker-end="url(#arrowhead)"/>

  <g>
    <rect x="290" y="480" width="200" height="70" rx="6" class="sec-box"/>
    <text x="300" y="498" class="sec-label">CONTROLE</text>
    <text x="300" y="514" class="sec-text">Nem DevOps le em claro.</text>
    <text x="300" y="528" class="sec-text">Acesso so por IAM role do</text>
    <text x="300" y="542" class="sec-text">servico que chama SERPRO.</text>
  </g>

  <g>
    <rect x="40" y="600" width="220" height="100" rx="8" class="step-box"/>
    <circle cx="60" cy="620" r="12" class="step-num"/>
    <text x="60" y="625" text-anchor="middle" class="step-num-text">7</text>
    <text x="80" y="625" class="step-title">Uso em runtime</text>
    <text x="50" y="648" class="step-desc">Descriptografa so no handshake</text>
    <text x="50" y="662" class="step-desc">mTLS com SERPRO. Zera buffer.</text>
    <text x="50" y="676" class="step-desc">Log audita fingerprint SHA-256,</text>
    <text x="50" y="690" class="step-desc">nunca conteudo do cert.</text>
  </g>
  <path d="M 150 560 L 150 600" class="arrow" marker-end="url(#arrowhead)"/>

  <g>
    <rect x="290" y="610" width="200" height="80" rx="6" class="sec-box"/>
    <text x="300" y="628" class="sec-label">AUDITORIA</text>
    <text x="300" y="644" class="sec-text">Cada leitura gera log WORM:</text>
    <text x="300" y="658" class="sec-text">quem, quando, qual CNPJ,</text>
    <text x="300" y="672" class="sec-text">request-id, resultado.</text>
    <text x="300" y="686" class="sec-text">Retencao 5 anos.</text>
  </g>

  <g>
    <rect x="560" y="610" width="220" height="60" rx="8" class="step-box"/>
    <text x="670" y="635" text-anchor="middle" class="step-title">SERPRO Integra Contador</text>
    <text x="670" y="656" text-anchor="middle" class="step-desc">emite DAS, NFe, DCTFWeb, ...</text>
  </g>
  <path d="M 260 640 L 560 640" class="arrow" marker-end="url(#arrowhead)"/>

  <g>
    <rect x="40" y="740" width="740" height="110" rx="8" class="step-box"/>
    <circle cx="60" cy="760" r="12" class="step-num"/>
    <text x="60" y="765" text-anchor="middle" class="step-num-text">8</text>
    <text x="80" y="765" class="step-title">Expiracao e revogacao (ciclo continuo)</text>

    <text x="60" y="792" class="step-desc">- Alertas automaticos ao cliente: 60 / 30 / 15 / 7 dias antes do vencimento.</text>
    <text x="60" y="808" class="step-desc">- Renovacao identica ao onboarding: upload + validacao + substituicao atomica.</text>
    <text x="60" y="824" class="step-desc">- Saida/cancelamento: revoga procuracao no eCAC + destroi envelope key (crypto-shredding).</text>
    <text x="60" y="840" class="step-desc">- Cert expirado = operacoes bloqueadas com mensagem clara; audit log preservado.</text>
  </g>
  <path d="M 150 700 L 150 740" class="arrow" marker-end="url(#arrowhead)"/>

  <g>
    <rect x="40" y="890" width="740" height="80" rx="8" fill="#fff" stroke="#e3e3de"/>
    <text x="60" y="912" class="step-title">Garantias atendidas</text>
    <text x="60" y="934" class="step-desc">- LGPD: base legal registrada, direito ao esquecimento via crypto-shredding.</text>
    <text x="60" y="950" class="step-desc">- ICP-Brasil: validacao de cadeia e CRL antes do aceite.</text>
    <text x="60" y="966" class="step-desc">- ISO 27001 / ASVS L2: chaves em KMS/HSM, auditoria imutavel, zero secrets em disco.</text>
  </g>

  <text x="410" y="1010" text-anchor="middle" class="subtitle-text">Pontos sensiveis: etapas 3, 6 e 7 tocam material criptografico - exigem pair review obrigatorio.</text>
</svg>
