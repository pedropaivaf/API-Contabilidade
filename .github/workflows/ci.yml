name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test:
    name: Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio pip-audit

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -q

      - name: pip-audit (vulnerabilidades em deps)
        run: pip-audit --strict

  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks (scan de segredos)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bandit (SAST Python)
        run: |
          pip install bandit[toml]
          bandit -r app -ll

      - name: Semgrep (regras OWASP)
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/owasp-top-ten p/python"

      - name: Trivy (scan de imagem Docker)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
